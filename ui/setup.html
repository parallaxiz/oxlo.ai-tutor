<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
    body { 
        background: #050508; color: #E8E8F0; font-family: 'DM Sans', sans-serif; 
        display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0;
    }
    body::before{
        content:''; position:fixed; inset:0;
        background:
            radial-gradient(ellipse 70% 60% at 15% 10%, rgba(82,45,240,.22) 0, transparent 65%),
            radial-gradient(ellipse 55% 45% at 85% 85%, rgba(99,220,150,.12) 0, transparent 65%),
            radial-gradient(ellipse 40% 55% at 65% 5%, rgba(56,189,248,.09) 0, transparent 65%);
        pointer-events:none; z-index:0;
    }

    .setup-card {
        position: relative; z-index: 1;
        background: rgba(10, 10, 15, 0.65);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 48px; border-radius: 28px; width: 100%; max-width: 540px; text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        animation: fadeUp .7s ease both;
    }
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

    h2 { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; letter-spacing: -0.02em; }
    h2 .accent {
        background: linear-gradient(135deg, #7c3aed 0%, #34d399 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding-right: 4px;
    }
    p { color: rgba(232, 232, 240, 0.45); margin-bottom: 32px; font-size: 0.95rem; }
    
    .section-title {
        font-family: 'JetBrains Mono', monospace; font-size: 0.70rem; letter-spacing: 0.15em;
        color: rgba(52, 211, 153, 0.8); margin-bottom: 14px; text-transform: uppercase;
        display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .section-title::before, .section-title::after {
        content: ''; height: 1px; width: 24px; background: rgba(52, 211, 153, 0.3);
    }

    .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
    .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 36px; }
    
    .opt-btn {
        background: rgba(255, 255, 255, 0.035); border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 16px; border-radius: 14px; color: rgba(232,232,240,.7); cursor: pointer; transition: all 0.2s;
        display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .opt-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
    .opt-btn.active { 
        background: rgba(124, 58, 237, 0.15); border-color: #7c3aed; color: #fff;
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.2); 
    }
    .opt-btn.level-btn.active {
        background: rgba(52, 211, 153, 0.12); border-color: rgba(52, 211, 153, 0.5); 
        box-shadow: 0 0 20px rgba(52, 211, 153, 0.15); color: #34d399;
    }

    .opt-icon { font-size: 1.5rem; }
    .opt-label { font-size: 0.85rem; font-weight: 600; font-family: 'DM Sans', sans-serif;}

    .start-btn {
        width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 1rem;
        background: linear-gradient(135deg, #7c3aed, #5b21b6);
        color: white; font-weight: 600; cursor: pointer; transition: all 0.25s;
        box-shadow: 0 0 30px rgba(124, 58, 237, 0.38), 0 1px 3px rgba(0,0,0,0.4);
    }
    .start-btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(124, 58, 237, 0.5); }
    .start-btn:active { transform: translateY(0); }
</style>
</head>
<body>
    <div class="setup-card">
        <h2>Setup <span class="accent">Codexa</span></h2>
        <p>Configure your workspace environments before dropping into the lab.</p>
        
        <div class="section-title">Language</div>
        <div class="option-grid">
            <div class="opt-btn active lang-opt" onclick="selectLang('python', this)">
                <span class="opt-icon">🐍</span>
                <span class="opt-label">Python</span>
            </div>
            <div class="opt-btn lang-opt" onclick="selectLang('javascript', this)">
                <span class="opt-icon">🟨</span>
                <span class="opt-label">JavaScript</span>
            </div>
            <div class="opt-btn lang-opt" onclick="selectLang('cpp', this)">
                <span class="opt-icon">🟦</span>
                <span class="opt-label">C++</span>
            </div>
            <div class="opt-btn lang-opt" onclick="selectLang('java', this)">
                <span class="opt-icon">☕</span>
                <span class="opt-label">Java</span>
            </div>
        </div>

        <div class="section-title">Difficulty Level</div>
        <div class="level-grid">
            <div class="opt-btn level-btn active" onclick="selectLevel('beginner', this)">
                <span class="opt-icon">🌱</span>
                <span class="opt-label">Beginner</span>
            </div>
            <div class="opt-btn level-btn" onclick="selectLevel('intermediate', this)">
                <span class="opt-icon">⚡</span>
                <span class="opt-label">Intermediate</span>
            </div>
            <div class="opt-btn level-btn" onclick="selectLevel('advanced', this)">
                <span class="opt-icon">🔥</span>
                <span class="opt-label">Advanced</span>
            </div>
            <div class="opt-btn level-btn" onclick="selectLevel('generated', this)" style="border-style: dashed;">
                <span class="opt-icon">♾️</span>
                <span class="opt-label">Endless Mode</span>
            </div>
        </div>

        <button class="start-btn" onclick="launchLab()">Initialize Environment ⚡</button>
    </div>

    <script>
        let selectedLang = 'python';
        let selectedLevel = 'beginner';

        function selectLang(lang, el) {
            selectedLang = lang;
            document.querySelectorAll('.lang-opt').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function selectLevel(level, el){
            selectedLevel = level;
            document.querySelectorAll('.level-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function launchLab() {
            var url = new URL(window.parent.location.href);
            url.searchParams.set('page', 'lab');
            url.searchParams.set('lang', selectedLang);
            url.searchParams.set('level', selectedLevel);
            window.parent.location.href = url.toString();
        }
    </script>
</body>
</html>
